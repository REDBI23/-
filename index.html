<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderFlow - Управление заказами</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 24px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }
        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .nav button {
            flex: 1;
            padding: 14px;
            background: transparent;
            color: #e2e8f0;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav button.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .content {
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            padding: 20px;
            margin: 12px 0;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        input, select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 70%;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .delete-btn {
            background: #ef4444;
        }
        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 10px;
        }
        .status-new { background: #fef3c7; color: #d97706; }
        .status-work { background: #dbeafe; color: #3b82f6; }
        .status-done { background: #d1fae5; color: #10b981; }
        .stats {
            background: rgba(30, 41, 59, 0.8);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OrderFlow</h1>
            <p>Управление заказами</p>
        </div>
        <div class="nav">
            <button onclick="showSection('orders')">Заказы</button>
            <button onclick="showSection('stats')">Статистика</button>
        </div>
        <div class="content">
            <div class="stats" id="stats">Заказов: 0 | Сумма: 0 ₽</div>
            
            <div id=


rders" class="section">
                <h2>Заказы</h2>
                <input type="text" id="order-client" placeholder="Клиент">
                <input type="text" id="order-item" placeholder="Товар">
                <input type="number" id="order-amount" placeholder="Сумма">
                <select id="order-status">
                    <option value="new">Новый</option>
                    <option value="work">В работе</option>
                    <option value="done">Завершён</option>
                </select>
                <button onclick="addOrder()">Добавить заказ</button>
                <div id="orders-list"></div>
            </div>
            <div id="stats" class="section" style="display:none;">
                <h2>Статистика</h2>
                <div id="stats-content"></div>
            </div>
        </div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(section).style.display = 'block';
        }

        function addOrder() {
            const client = document.getElementById("order-client").value.trim();
            const item = document.getElementById("order-item").value.trim();
            const amount = parseFloat(document.getElementById("order-amount").value);
            const status = document.getElementById("order-status").value;

            if (client && item && amount) {
                orders.push({ client, item, amount, status });
                localStorage.setItem("orders", JSON.stringify(orders));
                renderOrders();
                updateStats();
                document.getElementById("order-client").value = "";
                document.getElementById("order-item").value = "";
                document.getElementById("order-amount").value = "";
            }
        }

        function renderOrders() {
            const list = document.getElementById("orders-list");
            list.innerHTML = orders.map((o, i) => {
                let statusText = o.status === 'new' ? 'Новый' : o.status === 'work' ? 'В работе' : 'Завершён';
                return `<div class="card">Клиент: ${o.client} | Товар: ${o.item} | Сумма: ${o.amount} ₽ 
                <span class="status status-${o.status}">${statusText}</span>
                <button class="delete-btn" onclick="deleteOrder(${i})">Удалить</button></div>`;
            }).join("");
        }

        function deleteOrder(i) {
            orders.splice(i, 1);
            localStorage.setItem("orders", JSON.stringify(orders));
            renderOrders();
            updateStats();
        }

        function updateStats() {
            const total = orders.reduce((sum, o) => sum + o.amount, 0);
            document.getElementById("stats").innerHTML = `Заказов: ${orders.length} | Сумма: ${total} ₽`;
        }

        renderOrders();
        updateStats();
    </script>
</body>
</html>"
